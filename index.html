<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    .hero {
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }
    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #ff5722;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 20px;
    }
    .section {
      padding: 40px 20px;
      background: white;
      margin-top: 20px;
      border-radius: 10px;
    }
    .image {
      width: 100%;
      border-radius: 10px;
    }
    .form-box {
      background: #fff3e0;
      padding: 20px;
      border-radius: 10px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #4caf50;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- HERO SECTION -->
  <div class="hero">
    <h1>Your Powerful Headline Here</h1>
    <p>Write a short, compelling subheading that grabs attention.</p>

    <!-- IMAGE 1 -->
    <!-- Upload Image Here: Recommended Size 1200px width x 600px height -->
    <img src="image1.jpg" alt="Hero Image" class="image">

    <a href="#form" class="btn">Get Started Now</a>
  </div>

  <div class="container">

    <!-- SECTION 1 -->
    <div class="section">
      <h2>Why Choose This?</h2>
      <p>Explain benefits clearly. Focus on results and transformation.</p>

      <!-- IMAGE 2 -->
      <!-- Upload Image Here: Recommended Size 800px width x 500px height -->
      <img src="image2.jpg" alt="Benefits Image" class="image">
    </div>

    <!-- SECTION 2 -->
    <div class="section">
      <h2>What You Will Get</h2>
      <ul>
        <li>Benefit 1</li>
        <li>Benefit 2</li>
        <li>Benefit 3</li>
      </ul>

      <!-- IMAGE 3 -->
      <!-- Upload Image Here: Recommended Size 800px width x 500px height -->
      <img src="image3.jpg" alt="Offer Image" class="image">
    </div>

    <!-- FORM SECTION -->
    <div id="form" class="section form-box">
      <h2>Register Now</h2>
      <p>Fill the form below to get started.</p>

      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="tel" placeholder="Your Phone Number" required>
        <button type="submit">Submit</button>
      </form>
    </div>

  </div>

</body>
</html>
